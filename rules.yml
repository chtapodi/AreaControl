# Rule Structure:
#   Rule_Id:
#     trigger_prefix:   Device name prefix that triggers this rule (e.g., "motion_", "service_input_button_")
#     required_tags:    List of tags that must be present in the event for the rule to match
#     prohibited_tags:  List of tags that must NOT be present in the event
#     functions:        List of functions that must return True for the rule to execute
#     scope_functions:  Functions that determine which areas the state applies to
#                      (e.g., get_local_scope, get_entire_scope, get_area_local_scope)
#     state:            Base state dictionary to apply (e.g., {status: 1})
#     state_functions:  Functions that generate dynamic states (combined with 'state')
#                       (e.g., get_time_based_state, toggle_state, toggle_status)
#     combination_strategy: How to merge states from multiple sources:
#                          - "first": First non-empty state wins (reversed order)
#                          - "last": Last non-empty state wins
#                          - "average": Numeric values averaged, dicts merged recursively
#                          - "first_state": First valid state in list order

toggle_light_color:
  trigger_prefix: "service_input_button_double"
  scope_functions:
    - get_area_local_scope: []
  state_functions:
    - toggle_state: []
  functions :
    - update_tracker: []
  state: {}
  # state is passed by service call


toggle_light_status:
  trigger_prefix: "service_input_button_single"
  scope_functions:
    - get_area_local_scope: []
  state_functions:
    - toggle_status: []
  functions :
    - update_tracker: []
  state: {}
  # state is passed by service call


HA_only_on_lights: 
  trigger_prefix: "service_input_all_"
  scope_functions:
    - get_entire_scope: []
  functions:
    -  set_cached_last_set_state: ["$state"]
    
  # state is passed by service call


motion_on_tracker: 
  trigger_prefix: "motion_"
  required_tags: ["on"]
  functions:
    - update_tracker: []



motion_on: 
  trigger_prefix: "motion_"
  required_tags: ["on"]
  functions:
    - motion_sensor_mode: []
  scope_functions:
    - get_local_scope: []
  state:
    status: 1
  state_functions:
    # - get_last_track_state: []
    # - get_last_set_state: []
    - get_time_based_state: []
  combination_strategy: "first_state"
  device_type_filter: ["light"]




motion_off_after_15:
  trigger_prefix: "motion_"
  required_tags: ["off", "motion_occupancy"]
  functions:
    - motion_sensor_mode: []
  scope_functions:
    - get_local_scope: []
  state:
    status: 0
  device_type_filter: ["light"]

motion_off_ias:
  trigger_prefix: "motion_"
  required_tags: ["off", "motion_detected"]
  functions:
    - motion_sensor_mode: []
  scope_functions:
    - get_local_scope: []
  state:
    status: 0
  device_type_filter: ["light"]

living_room_zones_on:
  trigger_prefix: "presence_sensor_living_room_"
  required_tags: ["on", "presence"]
  functions:
    - motion_sensor_mode: []
    - update_tracker: []
  scope_functions:
    - get_local_scope: []
  state:
    status: 1
  state_functions:
    # - get_last_set_state: []
    - get_time_based_state: []
  combination_strategy: "first_state"
  device_type_filter: ["light"]

